# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "55abfa4ec3459d9a5d7a7dfcb1675afd"
name = "Custom Threshold"
application_url = "https://shopify-discount-app-production.up.railway.app/"
embedded = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_discounts,read_orders,write_discounts"

[auth]
redirect_urls = [ "https://shopify-discount-app-production.up.railway.app/api/auth" ]

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = false
